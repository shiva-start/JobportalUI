<section class="py-16 md:py-20 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Job Seekers CTA -->
      <div appReveal [revealOrigin]="'left'" class="group relative overflow-hidden rounded-2xl min-h-[380px] flex cursor-pointer shadow-sm hover:shadow-xl transition-all duration-300">
        <!-- Background Image -->
        <img
          src="https://images.unsplash.com/photo-1551434678-e076c223a692?w=1400&q=80&auto=format&fit=crop"
          alt="Job search"
          aria-hidden="false"
          class="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-500 ease-out group-hover:scale-105"
        />

        <!-- Gradient Overlay (improves contrast without flattening image) -->
        <div class="absolute inset-0 bg-gradient-to-r from-blue-900/70 via-blue-700/60 to-blue-500/50 group-hover:from-blue-900/60 group-hover:via-blue-700/50 group-hover:to-blue-500/40 transition-all duration-300"></div>

        <!-- Bottom Gradient -->
        <div class="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-transparent to-transparent"></div>

        <!-- Content (simplified, improved contrast & hierarchy) -->
        <div class="relative z-10 p-8 flex flex-col justify-center h-full text-white">
          <h3 class="text-2xl md:text-3xl font-semibold text-white mb-2 drop-shadow-md transform transition duration-300 group-hover:-translate-y-1">Find Your Next Job</h3>
          <p class="text-sm md:text-base text-white/90 leading-relaxed mb-5 max-w-md">Discover jobs that match your skills and apply in seconds.</p>

          <div class="flex items-center gap-3">
            <a routerLink="/register" class="bg-white text-blue-700 px-5 py-2.5 rounded-lg font-medium shadow hover:bg-gray-100 transition">Get Started</a>
          </div>
        </div>
      </div>

      <!-- Employers CTA -->
      <div appReveal [revealDelay]="120" [revealOrigin]="'right'" class="group relative overflow-hidden rounded-2xl min-h-[380px] flex cursor-pointer shadow-sm hover:shadow-xl transition-all duration-300">
        <!-- Background Image -->
        <img
          src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1400&q=80&auto=format&fit=crop"
          alt="Hiring team"
          aria-hidden="false"
          class="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-500 ease-out group-hover:scale-105"
        />

        <!-- Gradient Overlay (improves contrast without flattening image) -->
        <div class="absolute inset-0 bg-gradient-to-r from-blue-900/70 via-blue-700/60 to-blue-600/50 group-hover:from-blue-900/60 group-hover:via-blue-700/50 group-hover:to-blue-600/40 transition-all duration-300"></div>

        <!-- Bottom Gradient -->
        <div class="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-transparent to-transparent"></div>

        <!-- Content (simplified, improved contrast & hierarchy) -->
        <div class="relative z-10 p-8 flex flex-col justify-center h-full text-white">
          <h3 class="text-2xl md:text-3xl font-semibold text-white mb-2 drop-shadow-md transform transition duration-300 group-hover:-translate-y-1">Hire Top Talent</h3>
          <p class="text-sm md:text-base text-white/90 leading-relaxed mb-5 max-w-md">Post jobs and connect with qualified candidates faster.</p>

          <div class="flex items-center gap-3">
            <a routerLink="/register" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-medium shadow hover:bg-blue-700 transition">Post a Job</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
