<section class="w-full px-4 pb-16 md:px-6 md:pb-20 lg:px-8">
  <div
    appReveal
    class="relative overflow-hidden rounded-3xl bg-gradient-to-r from-blue-600 via-blue-600 to-indigo-700 px-6 py-16 text-center text-white shadow-xl md:px-10 md:py-20"
  >
    <div class="absolute inset-0 opacity-20">
      <div class="absolute -left-16 top-8 h-40 w-40 rounded-full bg-white/20 blur-3xl"></div>
      <div class="absolute -right-12 bottom-0 h-48 w-48 rounded-full bg-cyan-300/20 blur-3xl"></div>
    </div>

    <div class="relative mx-auto max-w-4xl">
      <h2 class="text-3xl font-semibold tracking-tight text-white md:text-4xl">
        {{ headingKey | translate }}
      </h2>

      <p class="mx-auto mt-4 max-w-2xl text-sm text-blue-100 md:text-base">
        {{ subtextKey | translate }}
      </p>

      <a
        [routerLink]="buttonLink"
        class="mt-8 inline-flex items-center gap-2 rounded-md bg-white px-6 py-3 font-medium text-blue-600 shadow-md transition duration-300 hover:-translate-y-0.5 hover:bg-slate-100 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-white/70 focus:ring-offset-2 focus:ring-offset-blue-700"
      >
        {{ buttonLabelKey | translate }}
        <span class="text-lg" aria-hidden="true">›</span>
      </a>
    </div>
  </div>
</section>
