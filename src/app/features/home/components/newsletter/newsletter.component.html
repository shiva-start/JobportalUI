<section class="relative py-20 overflow-hidden">
  <!-- Background image -->
  @if (newsletterImage) {
    <img
      [src]="newsletterImage.src"
      [srcset]="newsletterImage.srcset"
      [sizes]="newsletterImage.sizes"
      alt=""
      aria-hidden="true"
      [width]="newsletterImage.width"
      [height]="newsletterImage.height"
      [loading]="newsletterImage.loading"
      decoding="async"
      class="absolute inset-0 w-full h-full object-cover"/>
  }
  <!-- Gradient overlay -->
  <div class="absolute inset-0 bg-gradient-to-br from-blue-700/93 to-indigo-800/93"></div>

  <div appReveal class="relative max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <div class="w-14 h-14 rounded-2xl bg-white/15 flex items-center justify-center mx-auto mb-6 transition-transform duration-300 hover:-translate-y-1">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
    </div>
    <h2 class="text-3xl font-bold text-white mb-3">Never Miss an Opportunity</h2>
    <p class="text-blue-100 mb-8 text-sm leading-relaxed max-w-lg mx-auto">Get personalized job alerts delivered straight to your inbox. Be the first to apply when your ideal role is posted.</p>
    <div class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Enter your email address"
        class="flex-1 px-5 py-3.5 rounded-xl bg-white text-slate-800 placeholder-slate-400 text-sm outline-none border-2 border-transparent focus:border-blue-200 transition-all duration-200 focus:-translate-y-0.5"/>
      <button
        (click)="onSubmit()"
        class="px-6 py-3.5 bg-white/15 hover:bg-white/25 border border-white/30 text-white font-semibold rounded-xl transition-all duration-200 whitespace-nowrap text-sm hover:-translate-y-0.5">
        Get Alerts
      </button>
    </div>
    <p class="text-blue-200/70 text-xs mt-4">No spam. Unsubscribe anytime.</p>
  </div>
</section>
