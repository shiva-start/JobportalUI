<section class="relative overflow-hidden py-20 sm:py-24">
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat"
    [style.background-image]="backgroundImage"
    style="background-size: cover; background-position: center 38%;">
  </div>
  <div class="absolute inset-0 bg-[linear-gradient(135deg,rgba(3,20,64,0.86),rgba(11,58,149,0.76),rgba(7,21,74,0.9))]"></div>
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(191,219,254,0.16),transparent_36%),radial-gradient(circle_at_bottom_right,rgba(96,165,250,0.14),transparent_28%)]"></div>

  <div appReveal class="relative mx-auto max-w-5xl px-4 sm:px-6 lg:px-8">
    <div class="overflow-hidden rounded-[2rem] border border-white/12 bg-white/8 px-6 py-10 text-center shadow-[0_24px_90px_-40px_rgba(15,23,42,0.85)] backdrop-blur-md sm:px-10 sm:py-12 lg:px-14">
      <div class="mb-4 inline-flex items-center rounded-full border border-white/15 bg-white/10 px-4 py-1.5 text-[11px] font-semibold uppercase tracking-[0.24em] text-blue-100">
        Personalized Job Alerts
      </div>

      <div class="mx-auto mb-6 flex h-14 w-14 items-center justify-center rounded-2xl bg-white/14 transition-transform duration-300 hover:-translate-y-1">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </div>

      <h2 class="mx-auto max-w-2xl text-3xl font-bold tracking-tight text-white sm:text-4xl">
        Never Miss an Opportunity
      </h2>
      <p class="mx-auto mt-4 max-w-2xl text-sm leading-7 text-blue-100/95 sm:text-base">
        Get tailored job alerts, stay ahead of new openings, and hear about the roles that best match your experience before everyone else does.
      </p>

      <form
        appReveal
        [revealDelay]="100"
        class="mx-auto mt-8 max-w-2xl"
        (ngSubmit)="onSubmit()">
        <label for="newsletter-email" class="sr-only">Email address for job alerts</label>
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
          <input
            id="newsletter-email"
            name="newsletterEmail"
            type="email"
            [(ngModel)]="email"
            autocomplete="email"
            placeholder="Enter your email address"
            class="min-h-[56px] flex-1 rounded-2xl border border-white/20 bg-white px-5 text-sm text-slate-800 outline-none transition-all duration-200 placeholder:text-slate-400 focus:-translate-y-0.5 focus:border-blue-300 focus:ring-4 focus:ring-blue-200/50 sm:text-base"/>
          <button
            type="submit"
            class="min-h-[56px] whitespace-nowrap rounded-2xl bg-gradient-to-r from-sky-500 to-blue-600 px-7 text-sm font-semibold text-white shadow-lg shadow-blue-900/20 transition-all duration-200 hover:-translate-y-0.5 hover:from-sky-400 hover:to-blue-500 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-blue-200 focus:ring-offset-2 focus:ring-offset-blue-950/20 sm:text-base">
            Get Alerts
          </button>
        </div>
      </form>

      <div appReveal [revealDelay]="160" class="mt-5 flex flex-wrap items-center justify-center gap-2 text-xs font-medium text-blue-100/90">
        <span class="rounded-full border border-white/12 bg-white/10 px-3 py-1.5">Weekly role matches</span>
        <span class="rounded-full border border-white/12 bg-white/10 px-3 py-1.5">No spam</span>
        <span class="rounded-full border border-white/12 bg-white/10 px-3 py-1.5">Unsubscribe anytime</span>
      </div>

      <p class="mt-5 text-xs text-blue-200/75">
        We only send relevant alerts and product updates.
      </p>
    </div>
  </div>
</section>
