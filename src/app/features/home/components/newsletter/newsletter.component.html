<section class="bg-slate-50 py-12 md:py-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
      <div class="grid grid-cols-1 md:grid-cols-2 items-center gap-0">

        <!-- Content Section (Left) -->
        <div appReveal class="p-8 md:p-10 lg:p-12 space-y-6">
          <!-- Badge -->
          <div class="inline-block">
            <span class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-semibold text-blue-600 bg-blue-50 rounded-full border border-blue-100">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
              </svg>
              Stay Connected
            </span>
          </div>

          <!-- Heading -->
          <div class="space-y-3">
            <h2 class="text-3xl md:text-4xl font-bold text-slate-800 leading-tight">
              Never Miss a Great Opportunity
            </h2>
            <p class="text-slate-600 text-base md:text-lg leading-relaxed max-w-lg">
              Get personalized job alerts and career insights delivered directly to your inbox.
            </p>
          </div>

          <!-- Form -->
          <form appReveal [revealDelay]="100" (ngSubmit)="onSubmit()" class="space-y-3 pt-2">
            <label for="newsletter-email" class="sr-only">Email address</label>
            <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
              <input
                id="newsletter-email"
                name="newsletterEmail"
                type="email"
                [(ngModel)]="email"
                autocomplete="email"
                placeholder="Enter your email"
                required
                class="flex-1 px-4 py-3 rounded-lg border border-slate-200 text-slate-900 text-sm bg-white outline-none placeholder:text-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" />
              <button
                type="submit"
                class="px-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold text-sm whitespace-nowrap shadow-sm hover:shadow-md transition-all duration-200">
                Subscribe
              </button>
            </div>

            <!-- Trust badges -->
            <div appReveal [revealDelay]="150" class="flex flex-wrap gap-2 pt-1">
              <span class="text-xs text-slate-600 flex items-center gap-1.5">
                <svg class="w-4 h-4 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                No spam
              </span>
              <span class="text-xs text-slate-600 flex items-center gap-1.5">
                <svg class="w-4 h-4 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                Unsubscribe anytime
              </span>
            </div>
          </form>
        </div>

        <!-- Image Section (Right) -->
        <div class="hidden md:block h-full min-h-96 overflow-hidden bg-slate-100">
          <div
            class="w-full h-full bg-cover bg-center"
            [style.backgroundImage]="backgroundImage">
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
