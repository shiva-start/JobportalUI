<section class="py-20 bg-slate-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div appReveal class="text-center mb-14">
      <!-- <p class="text-blue-600 text-sm font-semibold uppercase tracking-widest mb-2">Simple process</p> -->
      <h2 class="text-3xl font-bold text-slate-900 mb-3">How It Works</h2>
      <p class="text-slate-500">Get hired in 3 easy steps</p>
    </div>

    <div class="relative grid grid-cols-1 md:grid-cols-3 gap-8">
      <!-- Connector line (desktop) -->
      <div class="hidden md:block absolute top-10 left-1/3 right-1/3 h-px bg-gradient-to-r from-blue-200 via-blue-300 to-blue-200 -translate-y-1/2 z-0"></div>

      @for (step of steps; track step.step; let i = $index) {
        <div appReveal [revealDelay]="i * 120" class="relative flex flex-col items-center text-center group z-10">
          <div class="w-20 h-20 rounded-2xl bg-blue-600 group-hover:bg-blue-700 text-white flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200 transition-all duration-300 group-hover:-translate-y-1 group-hover:shadow-xl">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" [attr.d]="step.svgPath"/>
            </svg>
          </div>
          <!-- <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-blue-100 border-2 border-blue-300 text-blue-700 text-xs font-bold flex items-center justify-center">
            {{ step.step }}
          </div> -->
          <h3 class="font-bold text-slate-900 text-lg mb-2">{{ step.title }}</h3>
          <p class="text-sm text-slate-500 leading-relaxed max-w-xs">{{ step.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
