<section class="relative h-screen flex items-center overflow-hidden" role="region" aria-label="Job search hero">
  <!-- Background Image with Overlay -->
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat"
    [style.backgroundImage]="'url(https://images.unsplash.com/photo-1552664730-d307ca884978?w=1600&q=80&auto=format&fit=crop)'"
    role="img"
    aria-label="Office professionals collaborating">
  </div>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/50"></div>

  <!-- Content -->
  <div class="relative max-w-5xl mx-auto px-4 space-y-8">
    <!-- Badge -->
    <div class="flex justify-center">
      <span class="inline-block px-4 py-1.5 text-sm font-medium text-blue-200 bg-blue-600/20 rounded-full border border-blue-400/30">
        {{ badgeText }}
      </span>
    </div>

    <!-- Heading -->
    <div class="text-center space-y-4">
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold text-white leading-tight">
        {{ titleLead }}<br><span class="text-blue-300">{{ titleHighlight }}</span>
      </h1>
      <p class="text-lg md:text-xl text-slate-200 max-w-3xl mx-auto leading-relaxed">
        {{ description }}
      </p>
    </div>

    <!-- Search Bar -->
    <div class="flex justify-center pt-4">
      <form (ngSubmit)="submitSearch()" class="w-full max-w-2xl">
        <div class="flex flex-col sm:flex-row items-stretch gap-3 bg-white rounded-xl shadow-lg p-3">
          <label class="sr-only" for="hero-job-keyword">Job title or keyword</label>
          <input
            id="hero-job-keyword"
            name="jobKeyword"
            [(ngModel)]="searchKeyword"
            type="text"
            autocomplete="off"
            placeholder="Job title or keyword"
            class="flex-1 px-4 py-3 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 outline-none bg-transparent focus:ring-2 focus:ring-blue-500 transition" />

          <label class="sr-only" for="hero-job-location">Location</label>
          <input
            id="hero-job-location"
            name="jobLocation"
            [(ngModel)]="searchLocation"
            type="text"
            autocomplete="off"
            placeholder="Location"
            class="w-full sm:w-auto px-4 py-3 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 outline-none bg-transparent focus:ring-2 focus:ring-blue-500 transition" />

          <button
            type="submit"
            class="px-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 whitespace-nowrap">
            Search
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
