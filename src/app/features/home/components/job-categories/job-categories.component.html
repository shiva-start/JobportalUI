<section class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div appReveal class="text-center mb-12">
      <p class="text-blue-600 text-sm font-semibold uppercase tracking-widest mb-2">{{ 'HOME.CATEGORIES.EYEBROW' | translate }}</p>
      <h2 class="text-3xl font-bold text-slate-900 mb-3">{{ 'HOME.CATEGORIES.TITLE' | translate }}</h2>
      <p class="text-slate-500 max-w-xl mx-auto">{{ 'HOME.CATEGORIES.DESCRIPTION' | translate }}</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
      @for (cat of categories; track cat.id; let i = $index) {
        <button (click)="categorySelected.emit(cat.filterValue)"
          appReveal
          [revealDelay]="i * 60"
          class="group relative overflow-hidden rounded-3xl border border-slate-200 bg-slate-900 text-left transition-all duration-300 hover:-translate-y-1.5 hover:border-blue-200 hover:shadow-xl hover:shadow-blue-100/60">
          <img
            class="h-52 w-full object-cover transition-transform duration-500 group-hover:scale-105"
            [src]="cat.image.src"
            [srcset]="cat.image.srcset"
            [sizes]="cat.image.sizes"
            [alt]="cat.image.alt"
            [width]="cat.image.width"
            [height]="cat.image.height"
            [loading]="cat.image.loading"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/65 to-slate-900/10"></div>
          <div class="absolute inset-x-0 bottom-0 flex items-end justify-between gap-4 p-5">
            <div>
              <p class="font-semibold text-white text-base group-hover:text-blue-100 transition-colors duration-200">{{ cat.labelKey | translate }}</p>
              <p class="text-sm text-slate-200 mt-1">{{ 'HOME.CATEGORIES.OPEN_ROLES' | translate:{ count: cat.count } }}</p>
            </div>
            <div [class]="'w-12 h-12 shrink-0 rounded-2xl flex items-center justify-center backdrop-blur-sm ring-1 ring-white/20 ' + cat.bgClass">
              <svg class="w-6 h-6" [class]="cat.iconClass" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" [attr.d]="cat.svgPath"/>
              </svg>
            </div>
          </div>
        </button>
      }
    </div>
  </div>
</section>
